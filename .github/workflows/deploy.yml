# .github/workflows/deploy.yml
#
# CI/CD: run tests then deploy to VPS on push to main.
# Deploy style: SSH → git fetch + reset --hard origin/main → ./scripts/deploy-prod.sh (plain docker run,
# image built locally on VPS — no registry involved).
#
# ── Required GitHub Secrets (Settings → Secrets and variables → Actions) ──────
#
#   VPS_HOST      VPS IP address or hostname
#   VPS_USER      SSH login user (e.g. ubuntu, root)
#   VPS_SSH_KEY   Private SSH key (PEM or OpenSSH format);
#                 add the matching public key to ~/.ssh/authorized_keys on the VPS
#   VPS_PORT      SSH port (set to 22 or leave empty to default to 22)
#   VPS_REPO_PATH Absolute path to the cloned repo on the VPS,
#                 e.g. /home/ubuntu/playable_tracking
#
# ── Optional ops secrets (post-deploy monitoring — all have safe defaults) ────
#
#   OPS_PIXEL_BASE             Pixel server base URL seen from the VPS
#                              (default: http://127.0.0.1:9000; same-VPS only)
#   OPS_DOCKER_COMPOSE_PROJECT Docker Compose project name; when absent the
#                              monitor auto-detects containers (discovery mode)
#   OPS_REDIS_QUEUE_KEY        Redis stream/list key for queue-depth reporting
#                              (default: pixel:events)
#
# ── Optional BigQuery log-export secrets (leave unset to keep exporter OFF) ──
#
#   OPS_BQ_EXPORT_ENABLED      Set to "1" to activate the log exporter on VPS.
#                              Default is "0" (off).  The deploy gate only checks
#                              exporter health when this is "1".
#   OPS_BQ_PROJECT_ID          GCP project ID that owns the BigQuery dataset
#   OPS_BQ_DATASET             BigQuery dataset name (default: pixel_ops_logs)
#   OPS_BQ_NGINX_TABLE         nginx requests table  (default: nginx_requests)
#   OPS_BQ_REDIS_TABLE         Redis metrics table   (default: redis_metrics)
#   OPS_BQ_EXPORT_INTERVAL_SECONDS   Export cadence in seconds (default: 300)
#   OPS_BQ_EXPORT_BATCH_SIZE   Rows per BigQuery insert batch (default: 5000)
#   OPS_BQ_CREATE_TABLES       "1" = create partitioned tables if missing (default: 0)
#
#   NOTE: The service-account key (GOOGLE_APPLICATION_CREDENTIALS path) is a
#   VPS-local file seeded once by hand — it is NEVER stored in GitHub Secrets
#   and NEVER printed or echoed by CI.  Store the JSON file on the VPS and set
#   GOOGLE_APPLICATION_CREDENTIALS in ops/.env by hand (see ops/README.md).
#
#   Privacy vars (OPS_LOG_HASH_IP, OPS_LOG_INCLUDE_QUERY,
#   OPS_LOG_QUERY_ALLOWLIST, OPS_LOG_DROP_HEADERS) may also be stored as GitHub
#   Variables (not Secrets) and injected below when non-empty.
#
# ── One-time manual pre-requisite (NOT a GitHub Secret, NOT in CI) ────────────
#
#   The BigQuery service-account key must be present on the VPS at:
#     <VPS_REPO_PATH>/app/credentials/pixel-writer-key.json
#   scripts/deploy-prod.sh exits 1 immediately if this file is missing.
#   Seed it once:
#     scp pixel-writer-key.json <VPS_USER>@<VPS_HOST>:<VPS_REPO_PATH>/app/credentials/
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ops/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Prevent two deploys running concurrently.
# A newer push cancels an in-progress deploy from an older push.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  # ── Job 2: Deploy (only after tests pass) ─────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Use the hashed (-H) form so the known_hosts entry is not plaintext.
      # Default SSH port to 22 when VPS_PORT secret is empty or not set.
      - name: Add VPS host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull & deploy on VPS
        timeout-minutes: 15
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -e; cd ${{ secrets.VPS_REPO_PATH }}; git fetch origin main; git reset --hard origin/main; bash ./scripts/deploy-prod.sh'

      - name: Verify health endpoint
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'curl -fsS http://127.0.0.1:9000/health'

      # Post-deploy: restart the ops monitoring daemons from the deployed scripts,
      # then gate their health. `ops-status.sh gate` exits non-zero if monitor /
      # logcollector / capacity are not healthy, failing the deploy.
      #
      # Config strategy: ops/.env on the VPS is the operator's persistent config and
      # is NEVER overwritten by CI.  If it does not exist yet, CI bootstraps a minimal
      # file with only PIXEL_BASE (from the OPS_PIXEL_BASE secret, or the same-VPS
      # default).  Optional secrets OPS_DOCKER_COMPOSE_PROJECT / OPS_REDIS_QUEUE_KEY
      # are injected as env overrides when non-empty — absent means auto-detect.
      #
      # BigQuery log export: all OPS_BQ_* vars are injected from GitHub
      # Secrets / Variables when non-empty.  The exporter is OFF by default
      # (OPS_BQ_EXPORT_ENABLED=0) — CI never force-enables it.
      # GOOGLE_APPLICATION_CREDENTIALS is a VPS-local path set once by hand in
      # ops/.env; it is NEVER read from GitHub Secrets and NEVER printed.
      #
      # No load test runs here: CAPACITY_ENABLED / LOADTEST_ENABLED default to 0 in
      # ops/.env.example; the capacity daemon only heartbeats/polls and never stresses
      # unless an operator manually enables it (see ops/README.md).
      - name: Post-deploy ops reconcile + health gate
        timeout-minutes: 5
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -e
             cd ${{ secrets.VPS_REPO_PATH }}
             chmod +x ops/bin/*.sh ops/tests/*.sh
             # Preserve existing ops/.env across redeploys — never overwrite.
             # Bootstrap a minimal file only when none exists yet.
             if [ ! -f ops/.env ]; then
               _base="${{ secrets.OPS_PIXEL_BASE }}"
               printf "PIXEL_BASE=%s\n" "${_base:-http://127.0.0.1:9000}" > ops/.env
             fi
             set -a; . ops/.env; set +a
             # CI-injected optional overrides (empty secret/var → ignored → auto-detect).
             _proj="${{ secrets.OPS_DOCKER_COMPOSE_PROJECT }}"
             [ -n "$_proj" ] && export OPS_DOCKER_COMPOSE_PROJECT="$_proj"
             _rqk="${{ secrets.OPS_REDIS_QUEUE_KEY }}"
             [ -n "$_rqk" ] && export OPS_REDIS_QUEUE_KEY="$_rqk"
             # BigQuery log-export overrides — only injected when the GitHub
             # Secret/Variable is non-empty; GOOGLE_APPLICATION_CREDENTIALS is
             # intentionally excluded (VPS-local file, never a CI secret).
             _bqen="${{ vars.OPS_BQ_EXPORT_ENABLED }}"
             [ -n "$_bqen" ] && export OPS_BQ_EXPORT_ENABLED="$_bqen"
             _bqp="${{ secrets.OPS_BQ_PROJECT_ID }}"
             [ -n "$_bqp" ] && export OPS_BQ_PROJECT_ID="$_bqp"
             _bqds="${{ vars.OPS_BQ_DATASET }}"
             [ -n "$_bqds" ] && export OPS_BQ_DATASET="$_bqds"
             _bqnt="${{ vars.OPS_BQ_NGINX_TABLE }}"
             [ -n "$_bqnt" ] && export OPS_BQ_NGINX_TABLE="$_bqnt"
             _bqrt="${{ vars.OPS_BQ_REDIS_TABLE }}"
             [ -n "$_bqrt" ] && export OPS_BQ_REDIS_TABLE="$_bqrt"
             _bqiv="${{ vars.OPS_BQ_EXPORT_INTERVAL_SECONDS }}"
             [ -n "$_bqiv" ] && export OPS_BQ_EXPORT_INTERVAL_SECONDS="$_bqiv"
             _bqbs="${{ vars.OPS_BQ_EXPORT_BATCH_SIZE }}"
             [ -n "$_bqbs" ] && export OPS_BQ_EXPORT_BATCH_SIZE="$_bqbs"
             _bqct="${{ vars.OPS_BQ_CREATE_TABLES }}"
             [ -n "$_bqct" ] && export OPS_BQ_CREATE_TABLES="$_bqct"
             # Privacy vars (non-sensitive — stored as GitHub Variables, not Secrets).
             _hi="${{ vars.OPS_LOG_HASH_IP }}"
             [ -n "$_hi" ] && export OPS_LOG_HASH_IP="$_hi"
             _iq="${{ vars.OPS_LOG_INCLUDE_QUERY }}"
             [ -n "$_iq" ] && export OPS_LOG_INCLUDE_QUERY="$_iq"
             _qa="${{ vars.OPS_LOG_QUERY_ALLOWLIST }}"
             [ -n "$_qa" ] && export OPS_LOG_QUERY_ALLOWLIST="$_qa"
             _dh="${{ vars.OPS_LOG_DROP_HEADERS }}"
             [ -n "$_dh" ] && export OPS_LOG_DROP_HEADERS="$_dh"
             bash ops/bin/ops-stop.sh
             bash ops/bin/ops-start.sh
             sleep 8
             # Gate: core 3 daemons always checked; exporter health only when enabled.
             bash ops/bin/ops-status.sh gate'
