# .github/workflows/deploy.yml
#
# CI/CD: run tests then deploy to VPS on push to main.
# Deploy style: SSH → git fetch + reset --hard origin/main → ./scripts/deploy-prod.sh (plain docker run,
# image built locally on VPS — no registry involved).
#
# ── Required GitHub Secrets (Settings → Secrets and variables → Actions) ──────
#
#   VPS_HOST      VPS IP address or hostname
#   VPS_USER      SSH login user (e.g. ubuntu, root)
#   VPS_SSH_KEY   Private SSH key (PEM or OpenSSH format);
#                 add the matching public key to ~/.ssh/authorized_keys on the VPS
#   VPS_PORT      SSH port (set to 22 or leave empty to default to 22)
#   VPS_REPO_PATH Absolute path to the cloned repo on the VPS,
#                 e.g. /home/ubuntu/playable_tracking
#
# ── Optional ops secrets (post-deploy monitoring — all have safe defaults) ────
#
#   OPS_PIXEL_BASE             Pixel server base URL seen from the VPS
#                              (default: http://127.0.0.1:9000; same-VPS only)
#   OPS_DOCKER_COMPOSE_PROJECT Docker Compose project name; when absent the
#                              monitor auto-detects containers (discovery mode)
#   OPS_REDIS_QUEUE_KEY        Redis stream/list key for queue-depth reporting
#                              (default: pixel:events)
#
# ── One-time manual pre-requisite (NOT a GitHub Secret, NOT in CI) ────────────
#
#   The BigQuery service-account key must be present on the VPS at:
#     <VPS_REPO_PATH>/app/credentials/pixel-writer-key.json
#   scripts/deploy-prod.sh exits 1 immediately if this file is missing.
#   Seed it once:
#     scp pixel-writer-key.json <VPS_USER>@<VPS_HOST>:<VPS_REPO_PATH>/app/credentials/
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Prevent two deploys running concurrently.
# A newer push cancels an in-progress deploy from an older push.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  # ── Job 2: Deploy (only after tests pass) ─────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Use the hashed (-H) form so the known_hosts entry is not plaintext.
      # Default SSH port to 22 when VPS_PORT secret is empty or not set.
      - name: Add VPS host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull & deploy on VPS
        timeout-minutes: 15
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -e; cd ${{ secrets.VPS_REPO_PATH }}; git fetch origin main; git reset --hard origin/main; bash ./scripts/deploy-prod.sh'

      - name: Verify health endpoint
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'curl -fsS http://127.0.0.1:9000/health'

      # Post-deploy: bring the ops monitoring daemons to a healthy state.
      # ops-start.sh is idempotent (reconciles pidfile + /proc cmdline + heartbeat),
      # so re-running it never spawns duplicate daemons — it only restarts dead or
      # ghost ones. `ops-status.sh gate` exits non-zero if monitor / logcollector /
      # capacity are not healthy, failing the deploy.
      #
      # Config strategy: ops/.env on the VPS is the operator's persistent config and
      # is NEVER overwritten by CI.  If it does not exist yet, CI bootstraps a minimal
      # file with only PIXEL_BASE (from the OPS_PIXEL_BASE secret, or the same-VPS
      # default).  Optional secrets OPS_DOCKER_COMPOSE_PROJECT / OPS_REDIS_QUEUE_KEY
      # are injected as env overrides when non-empty — absent means auto-detect.
      #
      # No load test runs here: CAPACITY_ENABLED / LOADTEST_ENABLED default to 0 in
      # ops/.env.example; the capacity daemon only heartbeats/polls and never stresses
      # unless an operator manually enables it (see ops/README.md).
      - name: Post-deploy ops reconcile + health gate
        timeout-minutes: 5
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "$PORT" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -e
             cd ${{ secrets.VPS_REPO_PATH }}
             chmod +x ops/bin/*.sh ops/tests/*.sh
             # Preserve existing ops/.env across redeploys — never overwrite.
             # Bootstrap a minimal file only when none exists yet.
             if [ ! -f ops/.env ]; then
               _base="${{ secrets.OPS_PIXEL_BASE }}"
               printf "PIXEL_BASE=%s\n" "${_base:-http://127.0.0.1:9000}" > ops/.env
             fi
             set -a; . ops/.env; set +a
             # CI-injected optional overrides (empty secret → ignored → auto-detect).
             _proj="${{ secrets.OPS_DOCKER_COMPOSE_PROJECT }}"
             [ -n "$_proj" ] && export OPS_DOCKER_COMPOSE_PROJECT="$_proj"
             _rqk="${{ secrets.OPS_REDIS_QUEUE_KEY }}"
             [ -n "$_rqk" ] && export OPS_REDIS_QUEUE_KEY="$_rqk"
             bash ops/bin/ops-start.sh
             sleep 8
             bash ops/bin/ops-status.sh gate'
